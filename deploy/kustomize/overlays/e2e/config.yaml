server:
  port: 8443
  maxSSEConnections: 5
  tls:
    certDir: /etc/apifrontend/tls
    required: true

agent:
  gcpProject: ""
  gcpRegion: "us-central1"
  kaBaseURL: "https://kubernaut-agent.kubernaut-system.svc:8080"
  kaMCPEndpoint: "https://kubernaut-agent.kubernaut-system.svc:8080/api/v1/mcp/"
  dsBaseURL: "https://data-storage-service.kubernaut-system.svc:8080"
  dsBearerTokenFile: "/var/run/secrets/kubernetes.io/serviceaccount/token"
  kaTlsCaFile: /etc/apifrontend/inter-service-ca/ca.crt
  dsTlsCaFile: /etc/apifrontend/inter-service-ca/ca.crt
  llmEndpoint: "http://mock-llm.kubernaut-system.svc:8080"
  llmModel: "mock-model"

session:
  namespace: kubernaut-system
  disconnectTTL: 2m
  retentionTTL: 720h

mcp:
  enabled: true
  sessionIdleTimeout: 5m

agentCard:
  url: "https://apifrontend.kubernaut-system.svc:8443"

auth:
  issuerURL: "http://dex.kubernaut-system.svc:5556/dex"
  jwksURL: "http://dex.kubernaut-system.svc:5556/dex/keys"
  audience: "kubernaut-apifrontend"
  allowInsecureIssuers: true

rbac:
  groupMapping:
    sre: sre
    ai-orchestrator: ai-orchestrator
    cicd: cicd
    observability: observability
    l3-audit: l3-audit
    remediation-approver: remediation-approver

severityTriage:
  enabled: true
  prometheusURL: "http://prometheus-svc.kubernaut-system.svc:9090"
  maxQueriesPerCall: 10
  maxRulesEvaluated: 100
  cacheTTLSeconds: 30
  llmConfidence: 0.7

logging:
  level: debug

rateLimit:
  ipRequestsPerSec: 10000
  userRequestsPerSec: 100
  maxConcurrentSessions: 50
  toolCallsPerMinute: 600

shutdown:
  drainSeconds: 3

resilience:
  ka:
    connectTimeout: 2s
    requestTimeout: 5s
    cbMaxRequests: 3
    cbInterval: 5s
    cbTimeout: 10s
    cbFailureThreshold: 3
    retryMax: 1
    retryInitBackoff: 100ms
    retryMaxBackoff: 1s
    retryableStatuses: [502, 503, 504]
  ds:
    connectTimeout: 2s
    requestTimeout: 5s
    cbMaxRequests: 3
    cbInterval: 5s
    cbTimeout: 10s
    cbFailureThreshold: 3
    retryMax: 1
    retryInitBackoff: 100ms
    retryMaxBackoff: 1s
    retryableStatuses: [502, 503, 504]
  k8s:
    connectTimeout: 2s
    requestTimeout: 5s
    cbMaxRequests: 3
    cbInterval: 5s
    cbTimeout: 10s
    cbFailureThreshold: 3
    retryMax: 0
    retryableStatuses: []
