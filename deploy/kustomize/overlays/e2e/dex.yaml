apiVersion: v1
kind: ConfigMap
metadata:
  name: dex-config
  namespace: kubernaut-system
data:
  config.yaml: |
    issuer: http://dex.kubernaut-system.svc:5556/dex

    storage:
      type: memory

    web:
      http: 0.0.0.0:5556

    oauth2:
      skipApprovalScreen: true
      passwordConnector: local

    staticClients:
      - id: kubernaut-apifrontend
        name: "Kubernaut API Frontend (E2E)"
        secret: e2e-client-secret
        redirectURIs:
          - "http://localhost:18443/callback"

    enablePasswordDB: true
    staticPasswords:
      - email: "e2e-user@kubernaut.ai"
        hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"
        username: "e2e-user"
        userID: "e2e-user-001"
---
apiVersion: v1
kind: Service
metadata:
  name: dex
  namespace: kubernaut-system
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dex
  ports:
    - name: http
      port: 5556
      targetPort: 5556
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex
  namespace: kubernaut-system
  labels:
    app.kubernetes.io/name: dex
    app.kubernetes.io/component: identity
    app.kubernetes.io/part-of: kubernaut
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dex
        app.kubernetes.io/component: identity
        app.kubernetes.io/part-of: kubernaut
    spec:
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:v2.41.1
          command: ["dex", "serve", "/etc/dex/config.yaml"]
          ports:
            - name: http
              containerPort: 5556
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /dex/healthz
              port: 5556
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/dex
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: dex-config
