apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: apifrontend-e2e
  annotations:
    description: "E2E overlay — realistic AF in Kind with TLS, DEX OIDC, and NetworkPolicy"

resources:
  - ../../base
  - dex.yaml
  - mock-llm.yaml
  - https://raw.githubusercontent.com/jordigilh/kubernaut/main/config/crd/bases/kubernaut.ai_remediationrequests.yaml
  - https://raw.githubusercontent.com/jordigilh/kubernaut/main/config/crd/bases/kubernaut.ai_remediationapprovalrequests.yaml

# Prometheus Operator CRDs are not available in bare Kind clusters
patches:
  - target:
      kind: PrometheusRule
      name: apifrontend-rules
    patch: |
      $patch: delete
      apiVersion: monitoring.coreos.com/v1
      kind: PrometheusRule
      metadata:
        name: apifrontend-rules
  - target:
      kind: ServiceMonitor
      name: apifrontend
    patch: |
      $patch: delete
      apiVersion: monitoring.coreos.com/v1
      kind: ServiceMonitor
      metadata:
        name: apifrontend
  - path: patch-deployment.yaml
    target:
      kind: Deployment
      name: apifrontend
  - path: patch-tls-optional.yaml
    target:
      kind: Deployment
      name: apifrontend
  - patch: |-
      - op: add
        path: /spec/egress/-
        value:
          to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/name: dex
          ports:
            - port: 5556
              protocol: TCP
      - op: add
        path: /spec/egress/-
        value:
          to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/name: kubernaut-agent
          ports:
            - port: 8443
              protocol: TCP
      - op: add
        path: /spec/egress/-
        value:
          to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/name: data-storage
          ports:
            - port: 8443
              protocol: TCP
      - op: add
        path: /spec/egress/-
        value:
          to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/name: mock-llm
          ports:
            - port: 8080
              protocol: TCP
    target:
      kind: NetworkPolicy
      name: apifrontend

configMapGenerator:
  - name: apifrontend-config
    behavior: replace
    files:
      - config.yaml

images:
  - name: quay.io/jordigilh/kubernaut-apifrontend
    newName: localhost/kubernaut-apifrontend
    newTag: e2e
  - name: ghcr.io/jordigilh/kubernaut/mock-llm
    newName: localhost/mock-llm
    newTag: e2e
