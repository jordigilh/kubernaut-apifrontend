apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: apifrontend-e2e
  annotations:
    description: "E2E overlay — realistic AF in Kind with TLS, DEX OIDC, and NetworkPolicy"

resources:
  - ../../base
  - dex.yaml

# Prometheus Operator CRDs are not available in bare Kind clusters
patches:
  - target:
      kind: PrometheusRule
      name: apifrontend-rules
    patch: |
      $patch: delete
      apiVersion: monitoring.coreos.com/v1
      kind: PrometheusRule
      metadata:
        name: apifrontend-rules
  - target:
      kind: ServiceMonitor
      name: apifrontend
    patch: |
      $patch: delete
      apiVersion: monitoring.coreos.com/v1
      kind: ServiceMonitor
      metadata:
        name: apifrontend
  - path: patch-deployment.yaml
    target:
      kind: Deployment
      name: apifrontend
  - path: patch-tls-optional.yaml
    target:
      kind: Deployment
      name: apifrontend

configMapGenerator:
  - name: apifrontend-config
    behavior: replace
    files:
      - config.yaml

images:
  - name: quay.io/jordigilh/kubernaut-apifrontend
    newName: localhost/kubernaut-apifrontend
    newTag: e2e
