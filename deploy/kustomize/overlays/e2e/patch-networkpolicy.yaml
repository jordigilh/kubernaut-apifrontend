apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apifrontend
spec:
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: kubernaut
      ports:
        - port: 8443
          protocol: TCP
        - port: 5556
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kubernaut-system
      ports:
        - port: 9090
          protocol: TCP
