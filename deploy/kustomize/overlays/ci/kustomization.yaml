apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: apifrontend-ci
  annotations:
    description: "CI overlay — Kind cluster in GitHub Actions with self-signed TLS"

resources:
  - ../../base

patches:
  - path: patch-deployment.yaml
    target:
      kind: Deployment
      name: apifrontend
  - path: patch-tls-optional.yaml
    target:
      kind: Deployment
      name: apifrontend

configMapGenerator:
  - name: apifrontend-config
    behavior: replace
    files:
      - config.yaml

images:
  - name: quay.io/jordigilh/kubernaut-apifrontend
    newName: localhost/kubernaut-apifrontend
    newTag: ci
