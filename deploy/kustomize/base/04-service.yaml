apiVersion: v1
kind: Service
metadata:
  name: apifrontend
  namespace: kubernaut-system
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kubernaut-apifrontend
    app.kubernetes.io/component: apifrontend
  ports:
    - name: https
      port: 8443
      targetPort: https
      protocol: TCP
    - name: health
      port: 8081
      targetPort: health
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
