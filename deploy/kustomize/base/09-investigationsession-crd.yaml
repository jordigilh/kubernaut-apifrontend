      type: string
    - jsonPath: .spec.userIdentity.username
      name: User
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          InvestigationSession links an A2A task to kubernaut pipeline CRDs.
          It enables session persistence across AF restarts and user reconnections.
          OwnerReference to the associated RemediationRequest ensures automatic
          garbage collection when the RR's retention TTL expires.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: InvestigationSessionSpec defines the desired state (immutable
              after creation).
            properties:
              a2aTaskID:
                description: A2ATaskID is the A2A task identifier for client reconnection.
                maxLength: 256
                minLength: 1
                type: string
              joinMode:
                description: JoinMode indicates whether the user started or joined
                  the investigation.
                enum:
                - start
                - takeover
                type: string
              remediationRequestRef:
                description: |-
                  RemediationRequestRef references the RR this session investigates.
                  The InvestigationSession MUST be created in the same namespace as the RR.
                  OwnerReference is set to this RR for cascade deletion.
                properties:
                  name:
                    description: Name of the referenced object.
                    type: string
                  namespace:
                    description: Namespace of the referenced object.
                    type: string
                required:
                - name
                - namespace
                type: object
              userIdentity:
                description: UserIdentity captures the authenticated user from the
                  originating JWT.
                properties:
                  groups:
                    description: Groups from JWT groups claim (RBAC-relevant only).
                    items:
                      type: string
                    type: array
                  username:
                    description: Username from JWT sub claim.
                    type: string
                required:
                - username
                type: object
            required:
            - a2aTaskID
            - joinMode
            - remediationRequestRef
            - userIdentity
            type: object
            x-kubernetes-validations:
            - message: spec is immutable
              rule: self == oldSelf
          status:
            description: InvestigationSessionStatus defines the observed state (mutable,
              AF-only).
            properties:
              aiAnalysisRef:
                description: AIAnalysisRef is the name of the discovered AIAnalysis
                  CRD.
                type: string
              completedAt:
                description: CompletedAt is the timestamp when the session reached
                  a terminal state.
