  name: investigationsessions.apifrontend.kubernaut.ai
spec:
  group: apifrontend.kubernaut.ai
  names:
    kind: InvestigationSession
    listKind: InvestigationSessionList
    plural: investigationsessions
    shortNames:
    - isess
    singular: investigationsession
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
