                type: string
              message:
                description: Message is a human-readable description of the current
                  state.
                type: string
              phase:
                description: Phase is the current lifecycle state.
                enum:
                - Active
                - Disconnected
                - Completed
                - Cancelled
                - Failed
                type: string
              reconnectedAt:
                description: ReconnectedAt is the last reconnect timestamp.
                format: date-time
                type: string
              startedAt:
                description: StartedAt is the session creation timestamp.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
