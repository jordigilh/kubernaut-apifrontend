apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: apifrontend-base
  annotations:
    description: "API Frontend base manifests - platform-agnostic configuration"

resources:
  - 09-investigationsession-crd.yaml
  - 00-namespace.yaml
  - 01-serviceaccount.yaml
  - 02-rbac.yaml
  - 03-deployment.yaml
  - 04-service.yaml
  - 05-prometheusrule.yaml
  - 06-networkpolicy.yaml
  - 07-pdb.yaml
  - 08-servicemonitor.yaml

labels:
  - pairs:
      app.kubernetes.io/name: kubernaut-apifrontend
      app.kubernetes.io/component: apifrontend
      app.kubernetes.io/part-of: kubernaut
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: true

namespace: kubernaut-system

configMapGenerator:
  - name: apifrontend-config
    files:
      - config.yaml
  - name: apifrontend-rbac-roles
    files:
      - rbac_roles.yaml

images:
  - name: quay.io/jordigilh/kubernaut-apifrontend
    newTag: latest
