apiVersion: v1
kind: ConfigMap
metadata:
  name: apifrontend-config
  labels:
    app.kubernetes.io/name: kubernaut-apifrontend
    app.kubernetes.io/component: config
data:
  config.yaml: |
    server:
      port: 8443

    agent:
      gcpProject: "REPLACE_ME"
      gcpRegion: "us-central1"
      kaBaseURL: "http://kubernaut-agent:8080"
      kaMCPEndpoint: "http://kubernaut-agent:8080/api/v1/mcp/"
      dsBaseURL: "http://data-storage:9090"

    mcp:
      enabled: true

    agentCard:
      url: "https://apifrontend.example.com"

    resilience:
      ka:
        connectTimeout: 5s
        requestTimeout: 30s
        cbMaxRequests: 3
        cbInterval: 10s
        cbTimeout: 30s
        cbFailureThreshold: 5
        retryMax: 2
        retryInitBackoff: 500ms
        retryMaxBackoff: 5s
        retryableStatuses: [502, 503, 504]
      ds:
        connectTimeout: 3s
        requestTimeout: 10s
        cbMaxRequests: 3
        cbInterval: 10s
        cbTimeout: 15s
        cbFailureThreshold: 3
        retryMax: 3
        retryInitBackoff: 200ms
        retryMaxBackoff: 3s
        retryableStatuses: [502, 503, 504]
      k8s:
        connectTimeout: 5s
        requestTimeout: 30s
        cbMaxRequests: 3
        cbInterval: 10s
        cbTimeout: 30s
        cbFailureThreshold: 5
        retryMax: 0
        retryableStatuses: []
