version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
    - revive
    - gosec

  exclusions:
    paths:
      - "api/apifrontend/v1alpha1/zz_generated.*"
    rules:
      - path: "(_test\\.go|^test/)"
        linters:
          - errcheck
        text: "Error return value of.*Close.*is not checked"
      - path: "(^test/|_test\\.go)"
        linters:
          - gosec
      - path: "^test/"
        linters:
          - staticcheck
        text: "ST1001"

  settings:
    errcheck:
      check-type-assertions: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: unexported-return

formatters:
  enable:
    - gofmt
    - goimports
