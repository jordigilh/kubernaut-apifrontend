name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  E2E_IMAGE: localhost/kubernaut-apifrontend:e2e
  KIND_CLUSTER_NAME: apifrontend-e2e
  NAMESPACE: kubernaut-system
  CERT_DIR: /tmp/apifrontend-e2e-certs

jobs:
  integration:
    name: "IT — Real DS + KA Containers (Podman)"
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 20
    env:
      IMAGE_REGISTRY: ghcr.io/jordigilh/kubernaut
      IMAGE_TAG: pr-828
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Setup envtest binaries
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.23
          echo "KUBEBUILDER_ASSETS=$($(go env GOPATH)/bin/setup-envtest use -p path)" >> "$GITHUB_ENV"

      - name: Run integration tests (real containers)
        run: make test-integration-containers

      - name: Collect container logs on failure
        if: failure()
        run: |
          mkdir -p /tmp/it-must-gather
          echo "=== Podman Containers ===" | tee /tmp/it-must-gather/podman-ps.txt
          podman ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" 2>&1 | tee -a /tmp/it-must-gather/podman-ps.txt || true
          for c in apifrontend_ka_test apifrontend_datastorage_test apifrontend_postgres_test apifrontend_redis_test apifrontend_mockllm_test; do
            echo "=== Full logs: $c ==="
            podman logs "$c" 2>&1 | tee /tmp/it-must-gather/"${c}.log" || true
          done

      - name: Upload must-gather logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: it-must-gather-logs
          path: /tmp/it-must-gather/
          retention-days: 7

      - name: Cleanup containers
        if: always()
        run: |
          podman rm -f apifrontend_ka_test apifrontend_mockllm_test apifrontend_datastorage_test apifrontend_redis_test apifrontend_postgres_test 2>/dev/null || true
          podman network rm apifrontend_test_network 2>/dev/null || true

  e2e:
    name: "E2E — Full Stack (Kind + Podman)"
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 60
    env:
      KIND_EXPERIMENTAL_PROVIDER: podman
      IMAGE_REGISTRY: ghcr.io/jordigilh/kubernaut
      IMAGE_TAG: main-e5db85e6c4bdb184c50ca26429e440f465b5b612  # v1.5.0-rc1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Install Kind v0.30.0
        run: |
          curl -Lo ./kind "https://github.com/kubernetes-sigs/kind/releases/download/v0.30.0/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Install Podman
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq podman
          podman --version

      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo@v2.28.3

      - name: Run E2E tests
        env:
          E2E_COVERAGE: "true"
          KIND_EXPERIMENTAL_PROVIDER: podman
          AF_E2E_SKIP_TEARDOWN: "true"
        run: |
          ginkgo -v --procs=$(nproc) --timeout=50m ./test/e2e/

      - name: Collect E2E coverage
        if: success() || failure()
        run: |
          COVER_DIR="/tmp/e2e-coverage"
          mkdir -p "$COVER_DIR"
          KUBECONFIG="$HOME/.kube/apifrontend-e2e-config"
          if [ -f "$KUBECONFIG" ]; then
            AF_POD=$(kubectl --kubeconfig="$KUBECONFIG" -n ${{ env.NAMESPACE }} get pods -l app.kubernetes.io/name=kubernaut-apifrontend -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [ -n "$AF_POD" ]; then
              kubectl --kubeconfig="$KUBECONFIG" cp "${{ env.NAMESPACE }}/$AF_POD:/tmp/coverage" "$COVER_DIR" -c apifrontend 2>/dev/null || true
            fi
          fi
          if ls "$COVER_DIR"/*.* >/dev/null 2>&1; then
            echo "=== E2E Coverage ==="
            go tool covdata percent -i="$COVER_DIR" 2>&1 | tee /tmp/e2e-coverage-summary.txt
            TOTAL=$(go tool covdata percent -i="$COVER_DIR" 2>/dev/null | grep -oP '\d+\.\d+%' | tail -1 | tr -d '%')
            echo "E2E_COVERAGE_PERCENT=$TOTAL" >> "$GITHUB_ENV"
          else
            echo "No coverage profiles collected (binary may not be coverage-instrumented)"
            echo "E2E_COVERAGE_PERCENT=0" >> "$GITHUB_ENV"
          fi

      - name: Coverage gate (80%)
        if: env.E2E_COVERAGE_PERCENT != '0'
        run: |
          THRESHOLD=80
          ACTUAL=$(echo "${{ env.E2E_COVERAGE_PERCENT }}" | cut -d. -f1)
          echo "E2E coverage: ${{ env.E2E_COVERAGE_PERCENT }}% (threshold: ${THRESHOLD}%)"
          if [ "$ACTUAL" -lt "$THRESHOLD" ]; then
            echo "::warning::E2E coverage ${{ env.E2E_COVERAGE_PERCENT }}% is below ${THRESHOLD}% threshold"
          fi

      - name: Collect must-gather on failure
        if: failure()
        run: |
          mkdir -p /tmp/e2e-must-gather
          KUBECONFIG="$HOME/.kube/apifrontend-e2e-config"
          if [ -f "$KUBECONFIG" ]; then
            kubectl --kubeconfig="$KUBECONFIG" -n ${{ env.NAMESPACE }} get pods -o wide 2>&1 | tee /tmp/e2e-must-gather/pods.txt || true
            kubectl --kubeconfig="$KUBECONFIG" -n ${{ env.NAMESPACE }} get events --sort-by='.lastTimestamp' 2>&1 | tee /tmp/e2e-must-gather/events.txt || true
            kubectl --kubeconfig="$KUBECONFIG" -n ${{ env.NAMESPACE }} get svc -o wide 2>&1 | tee /tmp/e2e-must-gather/services.txt || true
            kubectl --kubeconfig="$KUBECONFIG" -n ${{ env.NAMESPACE }} describe pods 2>&1 | tee /tmp/e2e-must-gather/pod-describe.txt || true
            for deploy in apifrontend kubernaut-agent data-storage dex mock-llm prometheus; do
              kubectl --kubeconfig="$KUBECONFIG" -n ${{ env.NAMESPACE }} logs "deployment/$deploy" --all-containers --tail=500 2>&1 | tee "/tmp/e2e-must-gather/${deploy}.log" || true
            done
            kubectl --kubeconfig="$KUBECONFIG" get crds 2>&1 | tee /tmp/e2e-must-gather/crds.txt || true
            kubectl --kubeconfig="$KUBECONFIG" -n ${{ env.NAMESPACE }} get investigationsessions -o yaml 2>&1 | tee /tmp/e2e-must-gather/investigationsessions.yaml || true
          else
            echo "No kubeconfig found — cluster may not have been created" | tee /tmp/e2e-must-gather/no-kubeconfig.txt
          fi

      - name: Upload must-gather
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-must-gather-logs
          path: /tmp/e2e-must-gather/
          retention-days: 7

      - name: Cleanup Kind cluster
        if: always()
        run: kind delete cluster --name ${{ env.KIND_CLUSTER_NAME }} 2>/dev/null || true

      - name: Cleanup Podman resources
        if: always()
        run: |
          podman ps -a --filter "name=apifrontend-e2e" --format "{{.Names}}" | xargs -r podman rm -f 2>/dev/null || true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true
      - run: go build ./...
