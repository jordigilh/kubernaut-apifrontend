name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  E2E_IMAGE: localhost/kubernaut-apifrontend:e2e
  KIND_CLUSTER_NAME: apifrontend-e2e
  NAMESPACE: kubernaut-system
  CERT_DIR: /tmp/apifrontend-e2e-certs

jobs:
  e2e-phase1:
    name: "Phase 1 — AF Standalone (TLS + DEX)"
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.29.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo@v2.28.3

      - name: Build E2E image
        run: docker build --target production -t ${{ env.E2E_IMAGE }} .

      - name: Create Kind cluster
        run: |
          kind create cluster \
            --name ${{ env.KIND_CLUSTER_NAME }} \
            --config deploy/kustomize/overlays/e2e/kind-config.yaml \
            --wait 60s

      - name: Load image into Kind
        run: kind load docker-image ${{ env.E2E_IMAGE }} --name ${{ env.KIND_CLUSTER_NAME }}

      - name: Generate TLS certificates
        run: |
          bash deploy/kustomize/overlays/e2e/generate-certs.sh ${{ env.CERT_DIR }}

      - name: Create TLS secrets
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret tls apifrontend-tls \
            --cert=${{ env.CERT_DIR }}/tls.crt \
            --key=${{ env.CERT_DIR }}/tls.key \
            -n ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic apifrontend-ca \
            --from-file=ca.crt=${{ env.CERT_DIR }}/ca.crt \
            -n ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy E2E stack (AF + DEX)
        run: |
          kubectl apply -k deploy/kustomize/overlays/e2e/
          kubectl rollout status deployment/dex -n ${{ env.NAMESPACE }} --timeout=90s
          kubectl rollout status deployment/apifrontend -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Wait for DEX readiness
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=dex \
            -n ${{ env.NAMESPACE }} --timeout=60s

      - name: Port-forward AF and DEX
        run: |
          kubectl port-forward -n ${{ env.NAMESPACE }} svc/apifrontend 18443:8443 &
          kubectl port-forward -n ${{ env.NAMESPACE }} svc/dex 15556:5556 &
          # Wait for port-forwards to be ready
          for i in $(seq 1 30); do
            if curl -s --cacert ${{ env.CERT_DIR }}/ca.crt https://localhost:18443/healthz >/dev/null 2>&1; then
              echo "AF port-forward ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "AF port-forward failed after 30 retries"
              kubectl -n ${{ env.NAMESPACE }} logs deployment/apifrontend --tail=50
              exit 1
            fi
            sleep 1
          done
          for i in $(seq 1 30); do
            if curl -sf http://localhost:15556/dex/healthz >/dev/null 2>&1; then
              echo "DEX port-forward ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "DEX port-forward failed after 30 retries"
              kubectl -n ${{ env.NAMESPACE }} logs deployment/dex --tail=50
              exit 1
            fi
            sleep 1
          done

      - name: Run E2E tests
        env:
          AF_E2E_BASE_URL: https://localhost:18443
          AF_E2E_CA_CERT: ${{ env.CERT_DIR }}/ca.crt
          AF_E2E_DEX_URL: http://localhost:15556/dex
          AF_E2E_CLIENT_ID: kubernaut-apifrontend
          AF_E2E_CLIENT_SECRET: e2e-client-secret
          AF_E2E_USERNAME: e2e-user@kubernaut.ai
          AF_E2E_PASSWORD: password
        run: |
          ginkgo -v --timeout=5m --label-filter="phase1" ./test/e2e/

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== AF Pod Logs ==="
          kubectl -n ${{ env.NAMESPACE }} logs deployment/apifrontend --tail=200 || true
          echo "=== DEX Pod Logs ==="
          kubectl -n ${{ env.NAMESPACE }} logs deployment/dex --tail=100 || true
          echo "=== Events ==="
          kubectl -n ${{ env.NAMESPACE }} get events --sort-by='.lastTimestamp' || true
          echo "=== Pod Status ==="
          kubectl -n ${{ env.NAMESPACE }} get pods -o wide || true

      - name: Cleanup Kind cluster
        if: always()
        run: kind delete cluster --name ${{ env.KIND_CLUSTER_NAME }}

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true
      - run: go build ./...
