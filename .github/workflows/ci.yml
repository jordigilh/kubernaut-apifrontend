name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify module checksums
        run: go mod verify

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o bin/apifrontend ./cmd/apifrontend/

      - name: Verify generated code is up to date
        run: |
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.19.0
          make verify-generate

  test-unit:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo@v2.28.3

      - name: Unit tests
        run: make test-unit

      - name: Coverage gate (raw total)
        run: |
          total=$(go tool cover -func=coverage_unit_apifrontend.out | grep '^total:' | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${total}%"
          threshold=80
          if [ "$(echo "${total} < ${threshold}" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${total}% is below ${threshold}% threshold"
            exit 1
          fi

      - name: Per-tier coverage report
        run: make coverage-report

      - name: Upload coverage profile
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-unit
          path: coverage_unit_apifrontend.out

      - name: Generate markdown report
        if: github.event_name == 'pull_request'
        id: coverage-markdown
        run: |
          {
            echo 'report<<EOF'
            python3 scripts/coverage/coverage_report.py --format markdown
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post coverage report to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@67d0dec7b07ed060a405f9b2a64b8ab319fdd7db # v2.9.2
        with:
          header: coverage-report
          message: |
            ${{ steps.coverage-markdown.outputs.report }}

  validate-openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Install vacuum
        run: go install github.com/daveshanley/vacuum@v0.26.4

      - name: Validate OpenAPI spec
        run: vacuum lint api/openapi/apifrontend-v1.yaml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4

  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck (strict)
        run: govulncheck ./...

      - name: Install gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.24.0

      - name: Secrets scanning (gitleaks)
        run: gitleaks detect --source . --no-banner

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@52485aec7be33610227643b0fe83936b8b5f061a # v3
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@52485aec7be33610227643b0fe83936b8b5f061a # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@52485aec7be33610227643b0fe83936b8b5f061a # v3

  validate-kustomize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate kustomize overlays
        run: make validate-kustomize

  maturity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Service maturity checks
        run: make validate-maturity-ci

  test-integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo@v2.28.3

      - name: Integration tests
        run: ginkgo -v --race --tags=integration --timeout=5m ./internal/...

  licenses:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@v1.6.0

      - name: Check dependency licenses
        run: >-
          go-licenses check ./...
          --allowed_licenses=Apache-2.0,BSD-2-Clause,BSD-3-Clause,MIT,ISC,MPL-2.0,Unlicense,CC0-1.0,0BSD
          --ignore=github.com/segmentio/asm
          --ignore=github.com/Alcova-AI/adk-anthropic-go
          --ignore=github.com/jordigilh/kubernaut-apifrontend

  sbom-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true

      - name: Build image
        run: docker build --target production -t ${{ env.TEST_IMG }} .
        env:
          TEST_IMG: kubernaut-apifrontend:ci

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin v1.20.0

      - name: Generate SBOM
        run: syft packages kubernaut-apifrontend:ci -o cyclonedx-json > sbom.cdx.json

      - name: Install Trivy
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.70.0

      - name: Scan image
        run: trivy image --severity CRITICAL,HIGH,MEDIUM --exit-code 1 --ignorefile .trivyignore kubernaut-apifrontend:ci

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify image signature (cosign, informational)
        run: |
          if cosign verify \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-identity-regexp="^https://github.com/jordigilh/kubernaut-apifrontend/.github/workflows/release.yml@refs/tags/" \
            kubernaut-apifrontend:ci 2>&1; then
            echo "::notice::Image signature verified"
          else
            echo "::notice::Image not signed (expected for CI builds) — verification enforced on release images only"
          fi
