name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.25'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o bin/apifrontend ./cmd/apifrontend/

      - name: Verify generated code is up to date
        run: |
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.19.0
          make verify-generate

  test-unit:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.25'
          cache: true

      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo@latest

      - name: Unit tests
        run: >-
          ginkgo -v --race
          --coverpkg=./internal/auth/...,./internal/ratelimit/...,./internal/security/...,./internal/httputil/...,./internal/logging/...,./internal/requestid/...,./internal/audit/...,./internal/metrics/...,./internal/agent/...,./internal/tools/...,./internal/ka/...,./internal/ds/...,./internal/session/...,./internal/config/...,./internal/handler/...,./internal/launcher/...,./internal/resilience/...,./internal/streaming/...,./internal/controller/...,./internal/validate/...
          --coverprofile=coverage.out
          ./internal/...

      - name: Coverage gate
        run: |
          total=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${total}%"
          threshold=80
          if [ "$(echo "${total} < ${threshold}" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${total}% is below ${threshold}% threshold"
            exit 1
          fi

  validate-openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.25'
          cache: true

      - name: Install vacuum
        run: go install github.com/daveshanley/vacuum@v0.26.4

      - name: Validate OpenAPI spec
        run: vacuum lint api/openapi/apifrontend-v1.yaml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.25'
          cache: true

      - uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.11.4

  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.25'
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4

      - name: Run gosec
        run: gosec -severity medium -confidence medium ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: |
          set +e
          govulncheck ./...
          RC=$?
          set -e
          if [ $RC -eq 0 ]; then
            exit 0
          fi
          # Exit code 3 = vulns found. Allow stdlib-only vulns when the
          # patched Go release (1.25.10) is not yet available for download.
          # TODO: revert to strict `govulncheck ./...` once go1.25.10 is released.
          if [ $RC -eq 3 ]; then
            echo "::warning::govulncheck found vulnerabilities — stdlib fix (go1.25.10) not yet released"
            exit 0
          fi
          exit $RC

  maturity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Service maturity checks
        run: make validate-maturity-ci

  test-integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.25'
          cache: true

      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo@latest

      - name: Integration tests
        run: ginkgo -v --race --tags=integration --timeout=5m ./internal/...

  sbom-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.25'
          cache: true

      - name: Build image
        run: docker build -t ${{ env.TEST_IMG }} .
        env:
          TEST_IMG: kubernaut-apifrontend:ci

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
        continue-on-error: true

      - name: Generate SBOM
        run: |
          if command -v syft &>/dev/null; then
            syft packages kubernaut-apifrontend:ci -o cyclonedx-json > sbom.cdx.json
          else
            echo "::warning::syft not available — skipping SBOM generation"
          fi
        continue-on-error: true

      - name: Install Trivy
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
        continue-on-error: true

      - name: Scan image
        run: |
          if command -v trivy &>/dev/null; then
            trivy image --severity CRITICAL,HIGH --exit-code 1 --ignorefile .trivyignore kubernaut-apifrontend:ci
          else
            echo "::warning::trivy not available — skipping image scan"
          fi
        continue-on-error: true
