apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: apifrontend-role
rules:
  # InvestigationSession CRD management
  - apiGroups: ["apifrontend.kubernaut.ai"]
    resources: ["investigationsessions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apifrontend.kubernaut.ai"]
    resources: ["investigationsessions/status"]
    verbs: ["get", "update", "patch"]
  # RemediationRequest read access (for ownerRef resolution and status)
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationrequests"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationrequests/status"]
    verbs: ["get"]
  # AIAnalysis read access (for investigation context)
  - apiGroups: ["kubernaut.ai"]
    resources: ["aianalyses"]
    verbs: ["get", "list", "watch"]
  # TokenReview for ServiceAccount token validation
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  # RemediationApprovalRequest management (native MCP tools)
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationapprovalrequests"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["kubernaut.ai"]
    resources: ["remediationapprovalrequests/status"]
    verbs: ["get", "patch"]
  # SignalProcessing creation (native MCP tools)
  - apiGroups: ["kubernaut.ai"]
    resources: ["signalprocessings"]
    verbs: ["get", "list", "watch", "create"]
  # WorkflowDefinition read access (native MCP tools)
  - apiGroups: ["kubernaut.ai"]
    resources: ["workflowdefinitions"]
    verbs: ["get", "list"]
  # Lease for distributed locking (dedup)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
